name: Deploy to GitHub Pages

on:
  # main 브랜치에 푸시될 때마다 워크플로 실행
  push:
    branches: [main]
  # 수동 실행 허용 (Actions 탭에서 'Run workflow' 버튼)
  workflow_dispatch:

# GITHUB_TOKEN 권한 설정: Pages 배포 + OIDC 토큰 발급
permissions:
  contents: read
  pages: write
  id-token: write

# 동시 실행 방지: 진행 중 배포는 취소하지 않고 큐에 대기시킴
concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6
      - name: Install, build, and upload your site
        uses: withastro/action@v6
        # 필요 시 옵션:
        # with:
        #   path: .              # 사이트 소스 루트
        #   node-version: 20     # 사용할 Node 버전
        #   package-manager: npm@latest

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5
